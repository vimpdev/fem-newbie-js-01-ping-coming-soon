<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ping coming soon page | VIMP</title>
  <meta name="description"
    content="Responsive coming soon page with semantic HTML, modern CSS architecture, and accessible email validation with dialog feedback.">
  <link rel="canonical" href="https://vimpdev.github.io/fem-newbie-js-01-ping-coming-soon/">

  <meta name="theme-color" content="#376CF1">

  <link rel="preload" href="./assets/fonts/libre-franklin-vf.woff2" as="font" type="font/woff2" crossorigin="anonymous">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vimpdev.github.io/fem-newbie-js-01-ping-coming-soon/">
  <meta property="og:site_name" content="VIMP">
  <meta property="og:title" content="Ping coming soon page | VIMP">
  <meta property="og:description"
    content="Responsive coming soon page with semantic HTML, modern CSS architecture, and accessible email validation with dialog feedback.">
  <meta property="og:image" content="https://vimpdev.github.io/fem-newbie-js-01-ping-coming-soon/docs/preview-og.png">
  <meta property="og:image:alt"
    content="Desktop view of a coming soon page showing focused input field and interactive elements with accessible styles.">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://vimpdev.github.io/fem-newbie-js-01-ping-coming-soon/">
  <meta name="twitter:title" content="Ping coming soon page | VIMP">
  <meta name="twitter:description"
    content="Responsive coming soon page with semantic HTML, modern CSS architecture, and accessible email validation with dialog feedback.">
  <meta name="twitter:image" content="https://vimpdev.github.io/fem-newbie-js-01-ping-coming-soon/docs/preview-og.png">
  <meta name="twitter:image:alt"
    content="Coming soon page with focused email input and visible interactive states for accessibility.">

  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
  <link rel="stylesheet" href="./styles/main.css">
  <script src="./scripts/main.js" defer></script>
</head>

<body>

  <header class="header">
    <div class="header__inner container">
      <img src="./assets/images/logo.svg" alt="Ping" class="brand">
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero__inner container stack">
        <div class="hero__content stack">
          <div class="hero__text stack">
            <h1 class="hero__title">We are launching <span class="text-accent">soon!</span></h1>
            <p class="hero__description">Subscribe and get notified</p>
          </div>
          <form class="form stack" novalidate>
            <div class="form__field stack">
              <label for="user-email" class="visually-hidden">Email address</label>
              <input type="email" name="email" id="user-email" class="form__input" placeholder="Your email address..."
                aria-describedby="error-message" autocomplete="email" pattern="^[^@\s]+@[^@\s]+\.[a-zA-Z]{2,}$"
                required>
              <p id="error-message" class="form__message" aria-live="polite" hidden></p>
            </div>
            <button type="submit" class="form__button">Notify Me</button>
          </form>
        </div>

        <div class="hero__image">
          <img src="./assets/images/illustration-dashboard.webp" alt="">
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__inner container">
      <div class="footer__content stack">
        <nav class="social" aria-label="Social media links">
          <ul class="social__list cluster">
            <li class="social__item">
              <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer"
                aria-label="Follow us on Facebook (opens in a new tab)" class="social__link">
                <svg class="social__icon" aria-hidden="true">
                  <use href="./assets/images/social-icons.svg#icon-facebook"></use>
                </svg>
              </a>
            </li>
            <li class="social__item">
              <a href="https://x.com" target="_blank" rel="noopener noreferrer"
                aria-label="Follow us on X, formerly Twitter (opens in a new tab)" class="social__link">
                <svg class="social__icon" aria-hidden="true">
                  <use href="./assets/images/social-icons.svg#icon-x-twitter"></use>
                </svg>
              </a>
            </li>
            <li class="social__item">
              <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer"
                aria-label="Follow us on Instagram (opens in a new tab)" class="social__link">
                <svg class="social__icon" aria-hidden="true">
                  <use href="./assets/images/social-icons.svg#icon-instagram"></use>
                </svg>
              </a>
            </li>
          </ul>
        </nav>
        <p class="footer__copy">&copy; Copyright Ping. All rights reserved.</p>
      </div>
      <small class="attribution">
        Challenge by <a href="https://www.frontendmentor.io/challenges" target="_blank" rel="noopener noreferrer"
          class="attribution__link">Frontend Mentor</a> – Coded by <a
          href="https://www.frontendmentor.io/profile/vimpdev" target="_blank" rel="noopener noreferrer"
          class="attribution__link">VIMP</a>
      </small>
    </div>
  </footer>

  <dialog class="dialog" aria-labelledby="dialog-title">
    <h2 id="dialog-title" class="dialog__title">Thanks for subscribing!</h2>
    <p class="dialog__description">We'll notify you when we launch.</p>
    <form method="dialog">
      <button class="dialog__button">Got it</button>
    </form>
  </dialog>
</body>

</html>
